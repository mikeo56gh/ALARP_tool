<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>px Group — ALARP Study Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --navy:#0D1F3C;--navy2:#1a3260;--navy3:#1e3c70;
  --green:#2E7D32;--green2:#4CAF50;--green3:#A5D6A7;
  --steel:#e8edf5;--steel2:#d0d8e8;
  --ink:#111827;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --bg:#F5F7FA;--card:#ffffff;--card2:#f9fafb;
  --red:#991b1b;--red-l:#fef2f2;--red-b:#fca5a5;
  --amber:#92400e;--amber-l:#fffbeb;--amber-b:#fcd34d;
  --gn:#14532d;--green-l:#f0fdf4;--green-b:#86efac;
  --blue:#1e3a8a;--blue-l:#eff6ff;--blue-b:#93c5fd;
  --r:6px;--r2:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(0,0,0,.10);
  --font:'Nunito Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6}
@media print{
  body{background:#fff;font-size:10pt}
  .no-print{display:none!important}
  #sidebar{display:none}
  #main{margin-left:0!important}
  .card{box-shadow:none!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .pb{page-break-before:always}
  .report-masthead{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  canvas{max-width:100%}
}
/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:260px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200}
#main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh}
/* Sidebar */
.sb-brand{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:block;width:100%;max-height:52px;object-fit:contain;margin-bottom:6px;background:#fff;border-radius:4px;padding:4px}
.sb-sub{font-size:10px;color:#6a9acc;font-weight:400;letter-spacing:.03em}
.sb-site{font-size:11px;color:#8aaaca;background:rgba(255,255,255,.06);border-radius:4px;padding:6px 10px;margin-top:8px}
.sb-site span{color:#c8d8f0;font-weight:700}
/* Project selector */
.sb-project-bar{padding:8px 12px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.08)}
.sb-project-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3a6a9a;margin-bottom:4px}
.sb-project-select{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;color:#c8d8f0;font-size:11px;font-family:var(--font);padding:5px 8px;outline:none;cursor:pointer}
.sb-project-select option{background:#0D1F3C;color:#c8d8f0}
.sb-project-actions{display:flex;gap:4px;margin-top:5px}
.sb-proj-btn{flex:1;padding:4px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8aaaca;font-size:10px;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap}
.sb-proj-btn:hover{background:rgba(255,255,255,.08);color:#c8d8f0;border-color:rgba(255,255,255,.2)}
.sb-proj-btn.danger:hover{background:rgba(180,50,50,.25);color:#f48a8a;border-color:rgba(180,50,50,.3)}
.sb-section{padding:8px 0}
.sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3a5a7a;padding:4px 16px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;color:#8aaaca;border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,.05);color:#c8d8f0}
.sb-item.active{border-left-color:var(--green2);background:rgba(76,175,80,.1);color:#c8d8f0;font-weight:600}
.sb-item .sb-ic{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.sb-badge{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:auto;flex-shrink:0}
.sb-badge-i{background:rgba(180,50,50,.35);color:#f9a0a0}
.sb-badge-u{background:rgba(180,130,30,.35);color:#f9d070}
.sb-badge-l{background:rgba(30,130,70,.35);color:#80d4a0}
.sb-badge-a{background:rgba(30,100,200,.35);color:#80b8f0}
.sb-badge-n{background:rgba(80,80,80,.35);color:#aaa}
.sb-del-btn{display:none;background:none;border:none;color:#8aaaca;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;flex-shrink:0;opacity:.6;transition:opacity .15s}
.sb-del-btn:hover{opacity:1;color:#f48a8a}
.sb-item:hover .sb-del-btn{display:block}
.sb-item.active .sb-del-btn{display:block}
.sb-divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:4px 0}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.sb-action{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:var(--r);border:1px solid rgba(255,255,255,.1);background:transparent;color:#8aaaca;font-size:11px;font-family:var(--font);cursor:pointer;text-align:left;transition:all .15s;margin-bottom:5px}
.sb-action:hover{background:rgba(255,255,255,.06);color:#c8d8f0}
.sb-action-p{background:rgba(46,125,50,.2);border-color:rgba(76,175,80,.35);color:#80d4a0}
.sb-action-g{background:rgba(46,125,50,.2);border-color:rgba(76,175,80,.35);color:#80d4a0}
/* Topbar */
#topbar{background:var(--card);border-bottom:1px solid #e5e7eb;padding:10px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.sc-name{font-size:15px;font-weight:700;color:var(--ink);border:none;background:transparent;outline:none;font-family:var(--font);min-width:220px;flex:1}
.sc-name::placeholder{color:var(--ink4)}
.sc-crumb{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px}
.tb-actions{display:flex;gap:6px;flex-shrink:0}
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer;border:1px solid #d1d5db;background:var(--card);color:var(--ink2);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#f3f4f6;border-color:#9ca3af}
.btn-primary{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.btn-primary:hover{background:var(--navy)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-success:hover{background:#1b5e20}
.btn-danger{color:var(--red);border-color:#fca5a5}
.btn-danger:hover{background:var(--red-l)}
/* Content */
#content{padding:20px 24px 40px;max-width:1080px}
/* Cards */
.card{background:var(--card);border:1px solid #e5e7eb;border-radius:var(--r2);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-header{padding:12px 18px;border-bottom:1px solid #f3f4f6;background:var(--card2);display:flex;align-items:center;justify-content:space-between}
.card-num{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#fff;background:var(--navy2);border-radius:20px;padding:2px 8px;margin-right:8px}
.card-title{font-size:13px;font-weight:700;color:var(--ink)}
.card-body{padding:18px}
/* Masthead */
.report-masthead{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);color:#fff;padding:0}
.mh-top{display:flex;align-items:stretch}
.mh-logo-zone{width:150px;min-height:100px;border-right:1px solid rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:14px;cursor:pointer;flex-shrink:0;background:#ffffff;transition:background .2s}
.mh-logo-zone:hover{background:#f5f5f5}
.mh-logo-zone img{max-width:130px;max-height:72px;object-fit:contain}
.mh-main{flex:1;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.mh-doc-type{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.45);margin-bottom:4px}
.mh-doc-title-input{font-size:20px;font-weight:800;color:#fff;background:transparent;border:none;outline:none;font-family:var(--font);width:100%;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:4px}
.mh-doc-title-input::placeholder{color:rgba(255,255,255,.3)}
.mh-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mh-field label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);display:block;margin-bottom:2px}
.mh-field input,.mh-field select{font-size:12px;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:5px 8px;width:100%;font-family:var(--font);outline:none}
.mh-field input::placeholder{color:rgba(255,255,255,.25)}
.mh-field input:focus,.mh-field select:focus{border-color:rgba(76,175,80,.5);background:rgba(255,255,255,.1)}
.mh-field select option{background:#0D1F3C}
.mh-strip{background:rgba(0,0,0,.25);padding:8px 24px;font-size:10px;color:rgba(255,255,255,.5);display:flex;gap:24px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.08)}
.mh-strip span{color:rgba(255,255,255,.8);font-weight:600}
/* Form */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;font-weight:700;color:var(--ink2);display:block;margin-bottom:4px}
.field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:7px 10px;border-radius:var(--r);border:1px solid #d1d5db;background:#fff;color:var(--ink);font-family:var(--font);font-size:12px;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green2);box-shadow:0 0 0 2px rgba(76,175,80,.12)}
.field textarea{resize:vertical;min-height:58px}
.hint{font-size:10px;color:var(--ink4);margin-top:3px;line-height:1.5}
/* Metric row */
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
.mc{border-radius:var(--r2);padding:12px 14px;border:1px solid}
.mc .ml{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.mc .mv{font-size:18px;font-weight:800;font-family:var(--mono);line-height:1.2}
.mc .ms{font-size:10px;margin-top:3px;opacity:.8}
.mc-r{background:var(--red-l);border-color:var(--red-b);color:var(--red)}
.mc-a{background:var(--amber-l);border-color:var(--amber-b);color:var(--amber)}
.mc-g{background:var(--green-l);border-color:var(--green-b);color:var(--gn)}
.mc-b{background:var(--blue-l);border-color:var(--blue-b);color:var(--blue)}
.mc-n{background:var(--card2);border-color:#e5e7eb;color:var(--ink2)}
/* Callout */
.co{border-radius:var(--r);padding:10px 14px;font-size:11px;line-height:1.7;border-left:3px solid;margin:10px 0}
.co-r{background:var(--red-l);border-color:var(--red);color:var(--red)}
.co-a{background:var(--amber-l);border-color:#d97706;color:var(--amber)}
.co-g{background:var(--green-l);border-color:#16a34a;color:var(--gn)}
.co-b{background:var(--blue-l);border-color:#2563eb;color:var(--blue)}
.co-n{background:var(--card2);border-color:#d1d5db;color:var(--ink2)}
/* Zone table */
.zt{width:100%;border-collapse:collapse;font-size:12px}
.zt th{text-align:left;padding:7px 10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink4);border-bottom:1px solid #e5e7eb;background:var(--card2)}
.zt td{padding:5px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.zt tr:last-child td{border-bottom:none}
.zt input{padding:4px 7px;font-size:11px;border-radius:4px;border:1px solid #e5e7eb;background:#fff;color:var(--ink);font-family:var(--font);width:100%}
.zt input:focus{outline:none;border-color:var(--green2)}
.mono{font-family:var(--mono);font-size:11px}
.del-btn{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:14px;padding:0 4px;line-height:1}
.del-btn:hover{color:var(--red)}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);border:1px dashed #d1d5db;background:transparent;color:var(--ink4);font-size:11px;cursor:pointer;font-family:var(--font);margin-top:8px;transition:all .15s}
.add-btn:hover{border-color:var(--green2);color:var(--green)}
/* Checklist */
.ck-group{display:flex;flex-direction:column}
.ck{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.ck:last-child{border-bottom:none}
.ck input[type=checkbox]{margin-top:2px;width:14px;height:14px;flex-shrink:0;accent-color:var(--green)}
.ck .ck-txt{font-size:12px;color:var(--ink2);line-height:1.5}
.ck input:checked+.ck-txt{color:var(--ink)}
.score-row{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);margin-top:8px}
.score-track{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
/* Bowtie */
.bt-wrap{overflow-x:auto;padding:8px 0}
.bt-row{display:flex;align-items:stretch;gap:0}
.bt-col{display:flex;flex-direction:column;gap:6px;padding:0 8px}
.bt-col-head{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);text-align:center;margin-bottom:4px;padding:4px 0;border-bottom:1px solid #e5e7eb}
.bt-event-col{flex:0 0 140px;display:flex;align-items:center}
.bt-hazard{background:var(--red-l);border:2px solid var(--red-b);border-radius:var(--r);padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--red);width:100%;min-height:60px;display:flex;align-items:center;justify-content:center}
.bt-barriers-col{flex:1;min-width:160px}
.bt-causes-col{flex:1;min-width:160px}
.bt-barrier{background:#fff;border:1px solid;border-radius:var(--r);padding:6px 10px;font-size:11px;position:relative;cursor:pointer;transition:box-shadow .15s}
.bt-barrier:hover{box-shadow:var(--shadow2)}
.bt-barrier.bt-prev{border-color:var(--blue-b);background:var(--blue-l)}
.bt-barrier.bt-mit{border-color:var(--green-b);background:var(--green-l)}
.bt-barrier.bt-failed{border-color:var(--red-b);background:var(--red-l);opacity:.7}
.bt-barrier .bt-bname{font-weight:700;color:var(--ink);font-size:11px}
.bt-barrier .bt-bsil{font-size:9px;font-family:var(--mono);color:var(--ink3);margin-top:2px}
.bt-barrier .bt-bstatus{font-size:9px;margin-top:3px;display:flex;align-items:center;gap:3px}
.bt-cause,.bt-conseq{font-size:11px;color:var(--ink2);background:var(--card2);border:1px solid #e5e7eb;border-radius:var(--r);padding:6px 10px}
.bt-leg{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb}
.bt-leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink3)}
.bt-leg-swatch{width:16px;height:10px;border-radius:2px;border:1px solid}
/* Revision table */
.rev-table{width:100%;border-collapse:collapse;font-size:12px}
.rev-table th{background:var(--navy2);color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.rev-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6}
.rev-table input{border:none;background:transparent;width:100%;font-family:var(--font);font-size:12px;color:var(--ink)}
.rev-table input:focus{outline:none;border-bottom:1px dashed var(--green2)}
/* Sign-off */
.so-table{width:100%;border-collapse:collapse;font-size:12px}
.so-table th{background:var(--card2);padding:8px 12px;border:1px solid #e5e7eb;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.so-table td{padding:10px 12px;border:1px solid #e5e7eb}
.so-table input{border:none;background:transparent;width:100%;font-family:var(--font);font-size:12px;color:var(--ink)}
.so-sig{border-bottom:1px solid var(--ink3);min-width:80px;display:inline-block;height:20px}
/* Result */
.result-block{border-radius:var(--r2);padding:20px;border:1px solid;margin-top:16px}
.result-block .r-title{font-size:15px;font-weight:800;margin-bottom:8px}
.result-block .r-body{font-size:12px;line-height:1.8}
.result-block ul{margin-top:10px;padding-left:18px}
.result-block li{margin-bottom:5px;font-size:12px}
.rb-i{background:var(--red-l);border-color:var(--red-b);color:var(--red)}
.rb-u{background:var(--amber-l);border-color:var(--amber-b);color:var(--amber)}
.rb-l{background:var(--green-l);border-color:var(--green-b);color:var(--gn)}
.rb-a{background:var(--blue-l);border-color:var(--blue-b);color:var(--blue)}
/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;border:1px solid}
.tg-r{background:var(--red-l);color:var(--red);border-color:var(--red-b)}
.tg-a{background:var(--amber-l);color:var(--amber);border-color:var(--amber-b)}
.tg-g{background:var(--green-l);color:var(--gn);border-color:var(--green-b)}
.tg-b{background:var(--blue-l);color:var(--blue);border-color:var(--blue-b)}
.tg-n{background:var(--card2);color:var(--ink2);border-color:#d1d5db}
/* Ref table */
.ref-t{width:100%;border-collapse:collapse;font-size:11px}
.ref-t th{background:var(--card2);padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);border-bottom:1px solid #e5e7eb}
.ref-t td{padding:6px 10px;border-bottom:1px solid #f3f4f6;color:var(--ink)}
.ref-t tr:last-child td{border-bottom:none}
/* Summary table */
.sum-t{width:100%;border-collapse:collapse;font-size:12px}
.sum-t th{background:var(--navy2);color:#fff;padding:8px 10px;text-align:left;font-size:10px;font-weight:700}
.sum-t td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.sum-t tr:hover td{background:var(--card2);cursor:pointer}
/* Disclaimer */
.disclaimer{font-size:10px;color:var(--ink4);line-height:1.6;padding:12px 18px;border-top:1px solid #f3f4f6;background:var(--card2)}
/* FN canvas */
#fn-canvas{display:block;width:100%;border-radius:var(--r);margin-top:10px;border:1px solid #e5e7eb}
/* Barrier modal overlay */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:var(--r2);padding:24px;width:480px;max-width:90vw;box-shadow:var(--shadow2)}
.modal-title{font-size:15px;font-weight:800;margin-bottom:16px;color:var(--navy)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* Project modal */
.proj-modal{max-width:360px}
.proj-modal input{width:100%;padding:8px 12px;border-radius:var(--r);border:1px solid #d1d5db;font-family:var(--font);font-size:13px;margin-bottom:16px}
.proj-modal input:focus{outline:none;border-color:var(--green2)}
.hidden{display:none!important}
/* Print all */
.print-scenario-sep{border:none;border-top:3px solid var(--navy);margin:32px 0}
</style>
</head>
<body>
<div id="app">

<!-- ─── SIDEBAR ─── -->

function load(){
  try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d)}catch(e){}
  if(!S.scenarios)S.scenarios=[];
  if(!S.study)S.study={};
  if(!S.study.revisions)S.study.revisions=[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}];
  if(!S.study.vpf)S.study.vpf=2000000;

  if(S.scenarios.length===0)newScenario(false);
  else selectSc(S.scenarios[0].id);
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}

function deleteScById(id){
  if(S.scenarios.length<=1){alert('Cannot delete the only assessment.');return}
  const target=S.scenarios.find(s=>s.id===id);
  const name=target?target.name||'Unnamed':'this assessment';
  if(!confirm(`Delete "${name}" permanently? This cannot be undone.`))return;
  S.scenarios=S.scenarios.filter(s=>s.id!==id);
  if(S.currentId===id)selectSc(S.scenarios[0].id);
  else{save();renderNav();}
}

// ══════════════════════════════════════════════════════════════
// MATHS
// ══════════════════════════════════════════════════════════════
function getF(){const s=getSc();return(s.freqM||1)*Math.pow(10,s.freqE||-4)}
function getPLL(){const f=getF(),s=getSc();return s.zones.reduce((a,z)=>a+f*z.pf*z.n,0)}
function getIRF(){const f=getF(),s=getSc();return s.zones.length?Math.max(...s.zones.map(z=>f*z.pf)):0}
function getN(){const s=getSc();return s.zones.reduce((a,z)=>a+z.n,0)}
function normCDF(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989423*Math.exp(-z*z/2),p=d*t*(.3193815+t*(-.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302745))));return z>0?1-p:p}
const fI=n=>0.01/n,fA=n=>1e-4/n,fM=n=>Math.sqrt(fI(n)*fA(n));
function getVPF(){return S.study.vpf||2000000;}
function fnR(n,f){if(f>fI(n))return'intolerable';if(f>fM(n))return'upper-alarp';if(f>fA(n))return'lower-alarp';return'acceptable'}
function irfR(irf,pop){const h=pop==='worker'?1e-3:1e-4;if(irf>h)return'intolerable';if(irf>h/10)return'upper-alarp';if(irf>1e-6)return'lower-alarp';return'acceptable'}
function worst(a,b){const o=['intolerable','upper-alarp','lower-alarp','acceptable'];return o[Math.min(o.indexOf(a),o.indexOf(b))]}
function sci(n){if(!n||isNaN(n)||n===0)return'—';const e=Math.floor(Math.log10(Math.abs(n))),c=(n/Math.pow(10,e)).toFixed(2);return(c==='1.00'?'':c+'×')+'10'+sp(e)}
function sp(n){const m={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'};return String(n).split('').map(c=>m[c]||c).join('')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// LIVE UPDATE METRICS
// ══════════════════════════════════════════════════════════════
function liveUpdate(){
  const s=getSc();if(!s)return;
  autoGDF(true);  // keep GDF in sync with current risk region
  const f=getF(),pll=getPLL(),irf=getIRF(),n=getN();
  const pop=s.popType||'worker',rrf=s.rrf||100,gdf=s.gdf||2;
  const irfReg=irfR(irf,pop),fnReg=fnR(n,f),w=worst(irfReg,fnReg);
  const pllAfter=pll/rrf,dPLL=pll-pllAfter;

  const mr=document.getElementById('metric-row');
  if(mr)mr.innerHTML=`
    <div class="mc ${RC[irfReg].mc}"><div class="ml">Worst-zone IRF</div><div class="mv">${sci(irf)}</div><div class="ms">/yr · ${RC[irfReg].label}</div></div>
    <div class="mc ${RC[w].mc}"><div class="ml">Total PLL</div><div class="mv">${sci(pll)}</div><div class="ms">fatalities/yr · Σ(F×Pf×N)</div></div>
    <div class="mc ${RC[fnReg].mc}"><div class="ml">FN region</div><div class="mv" style="font-size:14px">${RC[fnReg].label}</div><div class="ms">F=${sci(f)}, N=${n}</div></div>
    <div class="mc mc-n"><div class="ml">ΔPLL (RRF=${rrf.toLocaleString()}×)</div><div class="mv">${sci(dPLL)}</div><div class="ms">/yr reduction · PFD=${(1/rrf).toExponential(1)}</div></div>`;

  const ic=document.getElementById('irf-co');
  if(ic){
    const hi=pop==='worker'?1e-3:1e-4;
    if(irf>hi)ic.innerHTML=`<div class="co co-r">⚠ Worst-zone IRF (${sci(irf)}/yr) exceeds the maximum tolerable limit (${sci(hi)}/yr for ${pop==='worker'?'workers':'public'}). Action required irrespective of cost.</div>`;
    else if(irfReg!=='acceptable')ic.innerHTML=`<div class="co co-a">Worst-zone IRF is in the ${RC[irfReg].label} region. The most exposed individual's risk must be addressed as a priority.</div>`;
    else ic.innerHTML=`<div class="co co-g">✓ Worst-zone IRF (${sci(irf)}/yr) is broadly acceptable. Societal risk (PLL/FN) governs for multi-person scenarios.</div>`;
  }

  const rc=document.getElementById('rrm-co');
  if(rc)rc.innerHTML=`<div class="co co-b" style="margin-bottom:0;font-size:10px"><strong>RRM summary:</strong> RRF ${rrf.toLocaleString()}× applied to ${s.rrmType==='freq'?'scenario frequency':s.rrmType==='pf'?'fatality probability (Pf)':'population (N)'}. Mitigated frequency = ${sci(f/rrf)}/yr. Mitigated PLL = ${sci(pllAfter)}/yr. ΔPLL = ${sci(dPLL)} fatalities/yr.</div>`;

  const cb=document.getElementById('cba-co');
  if(cb){
    const cost=parseFloat(s.cost)||0;
    if(w==='intolerable'){
      cb.innerHTML='<div class="co co-r" style="font-size:10px"><strong>⚠ CBA and GDF do not apply in the intolerable region.</strong> Per HSE R2P2 and SPC/Perm/37, risk at this level must be reduced almost irrespective of cost. Cost-benefit arguments are only valid once risk has been reduced to the tolerable (ALARP) region. Prioritise risk reduction — do not use CBA to defer action.</div>';
    } else if(cost>0&&pll>0){
      const vpf=getVPF(),benefit=dPLL*vpf,maxCost=benefit*gdf,gross=cost>maxCost;
      cb.innerHTML=`<div class="co ${gross?'co-r':'co-g'}" style="font-size:10px"><strong>CBA:</strong> ΔPLL = ${sci(dPLL)} fatalities/yr × £${vpf.toLocaleString()} VPF = benefit of <strong>£${Math.round(benefit).toLocaleString()}</strong>. Maximum justifiable cost at GDF ${gdf}× = <strong>£${Math.round(maxCost).toLocaleString()}</strong>. Actual cost = <strong>£${Math.round(cost).toLocaleString()}</strong> (ratio ${(cost/benefit).toFixed(1)}×). ${gross?'⚠ Appears grossly disproportionate — document justification or seek lower-cost alternatives.':'✓ Cost is not grossly disproportionate.'}</div>`;
    }else cb.innerHTML='';
  }
  drawFN();
}

// ══════════════════════════════════════════════════════════════
// FN CANVAS
// ══════════════════════════════════════════════════════════════
function drawFN(){
  const cv=document.getElementById('fn-canvas');if(!cv)return;
  const W=cv.offsetWidth||640;cv.width=W*2;cv.height=400;cv.style.height='200px';
  const ctx=cv.getContext('2d');ctx.scale(2,2);
  const w=W,h=200,P={l:54,r:14,t:14,b:34};
  const PW=w-P.l-P.r,PH=h-P.t-P.b;
  const N0=1,N1=1000,F0=1e-8,F1=1e-1;
  const xs=n=>P.l+(Math.log10(n)-Math.log10(N0))/(Math.log10(N1)-Math.log10(N0))*PW;
  const ys=f=>P.t+(Math.log10(F1)-Math.log10(f))/(Math.log10(F1)-Math.log10(F0))*PH;
  ctx.fillStyle='#fafafa';ctx.fillRect(0,0,w,h);
  function fillB(u,l,c){ctx.beginPath();let fi=true;for(let n=N0;n<=N1;n*=1.08){const uf=u(n),uy=Math.max(P.t,Math.min(P.t+PH,ys(Math.min(uf,F1))));if(fi){ctx.moveTo(xs(n),uy);fi=false}else ctx.lineTo(xs(n),uy)}for(let n=N1;n>=N0;n/=1.08){const lf=l?l(n):F0,ly=Math.max(P.t,Math.min(P.t+PH,ys(Math.max(lf,F0))));ctx.lineTo(xs(n),ly)}ctx.closePath();ctx.fillStyle=c;ctx.fill()}
  fillB(()=>F1,fI,'rgba(153,27,27,.09)');
  fillB(fI,fM,'rgba(146,64,14,.09)');
  fillB(fM,fA,'rgba(20,83,45,.08)');
  fillB(fA,()=>F0,'rgba(30,58,138,.07)');
  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.5;
  [1,2,5,10,20,50,100,200,500,1000].forEach(n=>{ctx.beginPath();ctx.moveTo(xs(n),P.t);ctx.lineTo(xs(n),P.t+PH);ctx.stroke()});
  for(let e=-8;e<=-1;e++)[1,2,5].forEach(m=>{const f=m*Math.pow(10,e);if(f>=F0&&f<=F1){ctx.beginPath();ctx.moveTo(P.l,ys(f));ctx.lineTo(P.l+PW,ys(f));ctx.stroke()}});
  ctx.strokeStyle='#ccc';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,P.t+PH);ctx.moveTo(P.l,P.t+PH);ctx.lineTo(P.l+PW,P.t+PH);ctx.stroke();
  const tc='#6b7280';
  ctx.fillStyle=tc;ctx.font='8px JetBrains Mono,monospace';ctx.textAlign='center';
  [1,2,5,10,50,200,1000].forEach(n=>ctx.fillText(n,xs(n),P.t+PH+9));
  ctx.textAlign='right';for(let e=-8;e<=-1;e+=2){const f=Math.pow(10,e);if(f>=F0&&f<=F1)ctx.fillText('10'+sp(e),P.l-3,ys(f)+3)}
  ctx.textAlign='center';ctx.font='8px Inter,sans-serif';ctx.fillText('N (fatalities)',P.l+PW/2,h-2);
  ctx.save();ctx.translate(9,P.t+PH/2);ctx.rotate(-Math.PI/2);ctx.fillText('F (per yr)',0,0);ctx.restore();
  function dl(fn,col,dash){ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.setLineDash(dash||[]);let fi=true;for(let n=N0;n<=N1;n*=1.05){const f=fn(n);if(f>F1||f<F0)continue;if(fi){ctx.moveTo(xs(n),ys(f));fi=false}else ctx.lineTo(xs(n),ys(f))}ctx.stroke();ctx.setLineDash([])}
  dl(fI,'#991b1b');dl(fA,'#1e3a8a',[4,3]);
  // Anchor point
  ctx.beginPath();ctx.arc(xs(50),ys(2e-4),3,0,2*Math.PI);ctx.fillStyle='#991b1b';ctx.fill();
  // Scenario point
  const s=getSc();if(!s)return;
  const f=getF(),n=getN();
  if(f>=F0&&f<=F1&&n>=N0&&n<=N1){
    const r=fnR(n,f);
    const col=r==='intolerable'?'#991b1b':r==='upper-alarp'?'#92400e':r==='lower-alarp'?'#14532d':'#1e3a8a';
    const px=xs(n),py=ys(f);
    ctx.beginPath();ctx.arc(px,py,5,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=tc;ctx.font='bold 8px Inter,sans-serif';ctx.textAlign='left';
    ctx.fillText('Your scenario',px+7>P.l+PW-80?px-90:px+7,py+3);
  }
}

  'upper-alarp':{title:'Risk is in the upper ALARP region — rigorous ALARP demonstration required',
    body:'Risk is tolerable only if ALARP is actively demonstrated. Being nearer the intolerable boundary, a more rigorous justification is required (SPC/Perm/37 §30). GDF up to 10× may apply. A formal quantitative ALARP demonstration including societal risk assessment is expected.',
    actions:['Conduct a formal ALARP demonstration — qualitative arguments alone are insufficient at this level','Apply CBA with GDF up to 10× to evaluate all further measures','Assess societal risk using a full QRA and FN curve analysis','Document all options considered and reasons for rejection with engineering justification','Implement all relevant good practice as a minimum — this is non-negotiable','Discuss demonstration with HSE if uncertainty remains']},
  'lower-alarp':{title:'Risk is in the lower ALARP region — proportionate demonstration required',
    body:'Risk is tolerable provided ALARP is demonstrated proportionately. Good practice plus a proportionate CBA (GDF 1–2×) is normally sufficient at this level.',
    actions:['Confirm all applicable ACOPs, industry standards and good practice requirements are met','Apply CBA with GDF 1–2× to evaluate remaining practicable measures','Document the ALARP demonstration including rejected options with clear reasoning','Maintain a periodic review mechanism to capture new technology or updated standards']},
  acceptable:{title:'Risk is broadly acceptable — demonstrate ALARP through good practice',
    body:'Both individual risk (IRF) and societal risk (PLL/FN) fall below the broadly acceptable threshold. Detailed CBA is not required. Demonstrate ALARP through adherence to relevant codes, standards, and good practice.',
    actions:['Confirm compliance with all relevant standards and good practice','Maintain existing controls and confirm their continued effectiveness','Periodic review to ensure risk does not drift upward over time','Record this assessment to provide audit trail evidence for COMAH Safety Report']}
};

function runAssessment(){
  const s=getSc();if(!s)return;
  const f=getF(),pll=getPLL(),irf=getIRF(),n=getN();
  const pop=s.popType||'worker';
  const ir=irfR(irf,pop),fr=fnR(n,f),w=worst(ir,fr);
  const gpC=s.gp.filter(Boolean).length,fmC=s.fm.filter(Boolean).length;
  const rrf=s.rrf||100,pllAfter=pll/rrf,dPLL=pll-pllAfter;
  const cost=parseFloat(s.cost)||0,benefit=dPLL*getVPF(),maxCost=benefit*(s.gdf||2);
  const cbaPassed=cost===0||cost<=maxCost;
  s.result={worst:w,irfR:ir,fnR:fr,gpC,fmC,pll,irf,n,f,dPLL,cbaPassed,date:today()};
  s.assessed=true;s.modified=today();save();renderNav();
  renderResult(s);
  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderResult(s){
  const r=s.result;if(!r)return;
  const cfg=RCFG[r.worst],rc=RC[r.worst];
  let warns='';
  if(r.gpC<6)warns+=`<div class="co co-a">⚠ Good practice score: ${r.gpC}/8. HSE requires all good practice as a minimum irrespective of risk estimates. Address outstanding items before the ALARP claim is made.</div>`;
  if(r.fmC<4&&r.worst!=='acceptable')warns+=`<div class="co co-a">⚠ Further measures: ${r.fmC}/6 criteria met. ALARP is only satisfied when no further prima-facie measures can be identified. Review incomplete items and document.</div>`;
  if(!r.cbaPassed&&parseFloat(s.cost)>0)warns+=`<div class="co co-r">⚠ CBA indicates cost may be grossly disproportionate. Provide detailed engineering justification or identify lower-cost alternatives. This does not automatically mean the RRM is rejected — the full ALARP case must be considered holistically.</div>`;
  const failedBarriers=s.barriers.filter(b=>b.status==='failed');
  if(failedBarriers.length>0)warns+=`<div class="co co-r">⚠ ${failedBarriers.length} barrier(s) in the register are marked as FAILED: ${failedBarriers.map(b=>b.name).join(', ')}. Failed barriers must be addressed immediately — the ALARP case is undermined if claimed barriers are not in place.</div>`;

  document.getElementById('result-area').innerHTML=`
    <div class="pb"></div>
    <div class="result-block ${rc.rb}" id="result-block">
      <div class="r-title">Assessment outcome: ${cfg.title}</div>
      <div class="r-body">
        <strong>IRF (worst zone):</strong> ${sci(r.irf)} /yr — <strong>${RC[r.irfR].label}</strong> &nbsp;|&nbsp;
        <strong>PLL:</strong> ${sci(r.pll)} fatalities/yr &nbsp;|&nbsp;
        <strong>FN:</strong> F=${sci(r.f)}, N=${r.n} — <strong>${RC[r.fnR].label}</strong><br/>
        <strong>ΔPLL from RRM:</strong> ${sci(r.dPLL)} fatalities/yr<br/><br/>
        ${cfg.body}
      </div>
      <ul>${cfg.actions.map(a=>`<li>${a}</li>`).join('')}</ul>
      <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:6px">
        <span class="tag ${rc.tg}">Overall: ${rc.label}</span>
        <span class="tag ${RC[r.irfR].tg}">IRF: ${RC[r.irfR].label}</span>
        <span class="tag ${RC[r.fnR].tg}">FN: ${RC[r.fnR].label}</span>
        <span class="tag ${r.gpC>=6?'tg-g':'tg-a'}">Good practice: ${r.gpC}/8</span>
        <span class="tag ${r.cbaPassed?'tg-g':'tg-r'}">${r.cbaPassed?'CBA: proportionate':'CBA: disproportionate'}</span>
        <span class="tag tg-n">Assessed: ${r.date}</span>
      </div>
    </div>
    ${warns}`;
  renderRevisions();
}

function exportExcel(){
  if(typeof XLSX==='undefined'){alert('XLSX library not loaded. Check internet connection.');return}
  const wb=XLSX.utils.book_new();
  // Summary sheet
  const sumRows=[['ALARP Study — '+S.study.company,'','','','','','','','','',''],
    ['Site:',S.study.site||'','','','Doc ref:',S.study.docRef||'','','','Rev:',S.study.rev||''],
    [''],
    ['#','Scenario','Hazard ID','IRF (/yr)','PLL (/yr)','IRF region','FN region','ALARP verdict','GP score','Barriers','Assessed date']];
  S.scenarios.forEach((sc,i)=>{
    const r=sc.result;
    sumRows.push([i+1,sc.name||'',sc.hazardId||'',r?sci(r.irf):'',r?sci(r.pll):'',r?RC[r.irfR].label:'',r?RC[r.fnR].label:'',r?RC[r.worst].label:'Not assessed',r?r.gpC+'/8':'',sc.barriers?sc.barriers.length:'',sc.modified||sc.created]);
  });
  const wsSumm=XLSX.utils.aoa_to_sheet(sumRows);
  wsSumm['!cols']=[{wch:4},{wch:30},{wch:15},{wch:14},{wch:14},{wch:18},{wch:18},{wch:20},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsSumm,'Summary');

  // One sheet per scenario
  S.scenarios.forEach((sc,si)=>{
    const r=sc.result;
    const rows=[
      [`ALARP Assessment — ${sc.name||'Unnamed'}`],
      ['Document ref:',S.study.docRef||'','Site:',S.study.site||'','Company:',S.study.company||''],
      ['Hazard ID:',sc.hazardId||'','Node ref:',sc.nodeRef||'','Date:',sc.modified||sc.created],
      [''],
      ['=== SCENARIO ==='],
      ['Hazard description:',sc.hazardDesc||''],
      ['Proposed RRM:',sc.rrmDesc||''],
      [''],
      ['=== RISK INPUTS ==='],
      ['Scenario frequency:',sci(getFreqForSc(sc))+' /yr'],
      ['Population type:',sc.popType||'worker'],
      [''],
      ['Zone','Pf','N persons','Zone IRF (/yr)','Zone PLL (/yr)']
    ];
    sc.zones.forEach(z=>{
      const f=getFreqForSc(sc);rows.push([z.label,z.pf,z.n,sci(f*z.pf),sci(f*z.pf*z.n)]);
    });
    rows.push(['']);
    if(r){
      rows.push(['=== ASSESSMENT RESULT ==='],
        ['Overall verdict:',RC[r.worst].label],['IRF region:',RC[r.irfR].label],['FN region:',RC[r.fnR].label],
        ['Worst-zone IRF:',sci(r.irf)+' /yr'],['Total PLL:',sci(r.pll)+' /yr'],
        ['ΔPLL from RRM:',sci(r.dPLL)+' /yr'],['Good practice score:',r.gpC+'/8'],['CBA result:',r.cbaPassed?'Proportionate':'Disproportionate — justify'],
        ['Assessment date:',r.date]);
    }else rows.push(['Assessment not yet run']);
    rows.push([''],['=== BARRIER REGISTER ==='],
      ['Barrier name','Type','SIL','RRF','PFD','Status','Owner','Last tested','Notes']);
    sc.barriers.forEach(b=>rows.push([b.name,b.type,b.sil||'',b.rrf||'',b.pfd||'',b.status||'',b.owner||'',b.tested||'',b.notes||'']));
    rows.push([''],['=== GOOD PRACTICE ==='],['Item','Met?']);
    GP.forEach((g,i)=>rows.push([g,sc.gp[i]?'YES':'NO']));
    rows.push([''],['=== FURTHER MEASURES ==='],['Item','Met?']);
    FM.forEach((g,i)=>rows.push([g,sc.fm[i]?'YES':'NO']));
    rows.push([''],['=== SIGN-OFF ==='],
      ['Prepared by:',sc.preparedBy||'','Date:',sc.preparedDate||''],
      ['Checked by:',sc.checkedBy||'','Date:',sc.checkedDate||''],
      ['Approved by:',sc.approvedBy||'','Date:',sc.approvedDate||'']);
    if(sc.notes)rows.push([''],['Notes:',sc.notes]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:50},{wch:20},{wch:10},{wch:12},{wch:12},{wch:14},{wch:20},{wch:14},{wch:40}];
    XLSX.utils.book_append_sheet(wb,ws,('Sc'+(si+1)+'_'+(sc.name||'').replace(/[^a-zA-Z0-9]/g,'_').slice(0,25)));
  });

  XLSX.writeFile(wb,`ALARP_Study_${(S.study.site||'export').replace(/\s+/g,'_')}_${today()}.xlsx`);
}

function getFreqForSc(sc){return(sc.freqM||1)*Math.pow(10,sc.freqE||-4)}

function autoGDF(silent=false){
  const s=getSc();if(!s)return;
  const irf=getIRF(),f=getF(),n=getN();
  const pop=s.popType||'worker';
  const ir=irfR(irf,pop),fr=fnR(n,f),w=worst(ir,fr);
  const gdfMap={'intolerable':10,'upper-alarp':10,'lower-alarp':2,'acceptable':1};
  const recommended=gdfMap[w]||2;
  const hints={'intolerable':'Risk is intolerable — GDF 10× applied. CBA/GDF arguments do not apply until risk enters the tolerable region.',
    'upper-alarp':'Risk is in the upper ALARP region — GDF 10× recommended per HSE SPC/37 (disproportion must be gross nearer the intolerable boundary).',
    'lower-alarp':'Risk is in the lower ALARP region — GDF 2× recommended per HSE SPC/37 (1–2× appropriate at this level).',
    'acceptable':'Risk is broadly acceptable — GDF 1× applies (minimal disproportion needed to justify further measures).'};
  s.gdf=recommended;save();
  const sel=document.getElementById('gdf-select');if(sel)sel.value=recommended;
  const badge=document.getElementById('gdf-auto-badge');
  if(badge){badge.textContent='Auto: '+recommended+'×';badge.style.background=recommended>=10?'#fef2f2':recommended>=5?'#fffbeb':'#eff6ff';badge.style.color=recommended>=10?'#991b1b':recommended>=5?'#92400e':'#1e3a8a';}
  if(!silent){
    const hint=document.getElementById('gdf-hint');
    if(hint)hint.innerHTML='<span style="color:var(--navy2);font-weight:600">Auto-set to '+recommended+'×:</span> '+hints[w];
  }
  if(!silent)liveUpdate();
}

// ══════════════════════════════════════════════════════════════
// MULTI-PROJECT MANAGEMENT
// ══════════════════════════════════════════════════════════════
const PK='alarp_projects_v2';
const ACTIVE_PK='alarp_active_project_v2';

function getAllProjects(){
  try{const d=localStorage.getItem(PK);return d?JSON.parse(d):{}}catch(e){return{}}
}
function saveAllProjects(projects){
  try{localStorage.setItem(PK,JSON.stringify(projects))}catch(e){}
}
function getActiveProjectId(){
  return localStorage.getItem(ACTIVE_PK)||null;
}
function setActiveProjectId(id){
  localStorage.setItem(ACTIVE_PK,id);
}

function initProjects(){
  let projects=getAllProjects();
  let activeId=getActiveProjectId();
  // Migrate existing data if no projects exist
  if(Object.keys(projects).length===0){
    const existing=localStorage.getItem(SK);
    const firstId='proj_'+Date.now();
    if(existing){
      try{
        const data=JSON.parse(existing);
        projects[firstId]={id:firstId,name:'Default Project',data:data};
      }catch(e){
        projects[firstId]={id:firstId,name:'Default Project',data:null};
      }
    } else {
      projects[firstId]={id:firstId,name:'Default Project',data:null};
    }
    saveAllProjects(projects);
    activeId=firstId;
    setActiveProjectId(activeId);
  }
  if(!activeId||!projects[activeId]){
    activeId=Object.keys(projects)[0];
    setActiveProjectId(activeId);
  }
  // Load active project data into S
  const proj=projects[activeId];
  if(proj&&proj.data){
    try{S=proj.data}catch(e){}
  }
  renderProjectSelector();
}

function renderProjectSelector(){
  const sel=document.getElementById('project-select');
  if(!sel)return;
  const projects=getAllProjects();
  const activeId=getActiveProjectId();
  sel.innerHTML=Object.values(projects).map(p=>
    `<option value="${p.id}" ${p.id===activeId?'selected':''}>${p.name}</option>`
  ).join('');
}

function saveCurrentProject(){
  const projects=getAllProjects();
  const activeId=getActiveProjectId();
  if(!projects[activeId])return;
  projects[activeId].data=JSON.parse(JSON.stringify(S));
  saveAllProjects(projects);
}

function switchProject(id){
  // Save current project
  saveCurrentProject();
  // Load new project
  const projects=getAllProjects();
  const proj=projects[id];
  if(!proj)return;
  setActiveProjectId(id);
  if(proj.data){
    try{S=JSON.parse(JSON.stringify(proj.data))}catch(e){S={scenarios:[],currentId:null,logoDataUrl:null,study:{company:'',site:'',docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}}};}
  } else {
    // New empty project state
    S={scenarios:[],currentId:null,logoDataUrl:null,study:{company:'',site:'',docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}};
  }
  if(!S.scenarios)S.scenarios=[];
  if(!S.study)S.study={};
  if(S.scenarios.length===0)newScenario(false);
  if(!S.currentId&&S.scenarios.length>0)selectSc(S.scenarios[0].id);
  renderProjectSelector();
  renderNav();
  renderScenario();
}

function newProject(){
  const name=prompt('New project name:','New Project');
  if(!name||!name.trim())return;
  saveCurrentProject();
  const projects=getAllProjects();
  const id='proj_'+Date.now();
  projects[id]={id,name:name.trim(),data:null};
  saveAllProjects(projects);
  setActiveProjectId(id);
  S={scenarios:[],currentId:null,logoDataUrl:null,study:{company:'',site:'',docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}};
  newScenario(false);
  selectSc(S.scenarios[0].id);
  renderProjectSelector();
  renderNav();
  renderScenario();
}

function renameProject(){
  const projects=getAllProjects();
  const activeId=getActiveProjectId();
  const current=projects[activeId];
  if(!current)return;
  const name=prompt('Rename project:',current.name);
  if(!name||!name.trim())return;
  current.name=name.trim();
  saveAllProjects(projects);
  renderProjectSelector();
  renderNav();
}

function deleteProject(){
  const projects=getAllProjects();
  if(Object.keys(projects).length<=1){alert('Cannot delete the only project.');return}
  const activeId=getActiveProjectId();
  const current=projects[activeId];
  if(!confirm(`Delete project "${current?.name||'this project'}" and all its scenarios? This cannot be undone.`))return;
  delete projects[activeId];
  const newId=Object.keys(projects)[0];
  saveAllProjects(projects);
  switchProject(newId);
}

// Override save() to also save current project
const _origSave=save;
function save(){
  _origSave();
  saveCurrentProject();
}

// PRINT ALL SCENARIOS
// ══════════════════════════════════════════════════════════════
function printAllScenarios(){
  const savedId=S.currentId;
  // Build print content with all scenarios
  const printDiv=document.createElement('div');
  printDiv.id='print-all-container';
  printDiv.style.cssText='position:fixed;top:0;left:0;width:100%;z-index:9999;background:#fff;padding:20px;display:none';
  S.scenarios.forEach((sc,idx)=>{
    const divider=document.createElement('div');
    divider.innerHTML=idx>0?'<hr class="print-scenario-sep"/>':'';
    printDiv.appendChild(divider);
    const label=document.createElement('div');
    label.style.cssText='font-size:10px;color:#666;margin-bottom:8px;font-family:Nunito Sans,sans-serif';
    label.textContent=`Scenario ${idx+1} of ${S.scenarios.length}: ${sc.name||'Unnamed'}`;
    printDiv.appendChild(label);
  });
  // Use browser print after selecting each scenario's content from DOM
  // Simpler: iterate, render, capture
  let printHTML='<html><head><title>ALARP Study — All Scenarios</title>';
  printHTML+='<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">';
  printHTML+=`<style>${document.querySelector('style').textContent}</style>`;
  printHTML+='</head><body>';
  const savedScenarios=JSON.parse(JSON.stringify(S.scenarios));
  const savedCurrent=S.currentId;
  S.scenarios.forEach((sc,idx)=>{
    if(idx>0)printHTML+='<div style="page-break-before:always"></div>';
    // Set current and render  
    S.currentId=sc.id;
    // Get rendered HTML
    const tempDiv=document.createElement('div');
    tempDiv.style.display='none';
    document.body.appendChild(tempDiv);
    tempDiv.innerHTML='<div id="content-tmp"></div>';
    const tmp=tempDiv.querySelector('#content-tmp');
    tmp.innerHTML=buildHTML(sc);
    // Inline fn canvas
    printHTML+=`<div class="content" style="padding:20px">`;
    printHTML+=tmp.innerHTML.replace(/<canvas[^>]*><\/canvas>/g,'<div style="border:1px dashed #ccc;height:100px;display:flex;align-items:center;justify-content:center;color:#999;font-size:10px;font-family:Nunito Sans,sans-serif">FN Curve — view in tool</div>');
    printHTML+='</div>';
    document.body.removeChild(tempDiv);
  });
  S.currentId=savedCurrent;
  printHTML+='</body></html>';
  const win=window.open('','_blank','width=900,height=700');
  if(win){
    win.document.write(printHTML);
    win.document.close();
    win.focus();
    setTimeout(()=>{win.print();},800);
  }
}

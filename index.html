<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Saltend Chemicals Park — ALARP Study Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0D1F3C;--navy2:#162d52;
  --green:#2E9B3C;--green2:#3DB34A;--green3:#c8f0cb;
  --orange:#E35205;
  --steel:#e8edf5;--steel2:#d0d8e8;
  --ink:#111827;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --bg:#F5F7FA;--card:#ffffff;--card2:#f9fafb;
  --red:#991b1b;--red-l:#fef2f2;--red-b:#fca5a5;
  --amber:#92400e;--amber-l:#fffbeb;--amber-b:#fcd34d;
  --gn:#14532d;--green-l:#f0fdf4;--green-b:#86efac;
  --blue:#1e3a8a;--blue-l:#eff6ff;--blue-b:#93c5fd;
  --r:6px;--r2:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow2:0 4px 16px rgba(0,0,0,.12);
  --font:'Nunito Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6}
@media print{
  body{background:#fff;font-size:10pt}
  .no-print{display:none!important}
  #sidebar{display:none}
  #main{margin-left:0!important}
  .card{box-shadow:none!important;border:1px solid #ddd!important;page-break-inside:avoid}
  canvas{max-width:100%}
}
#app{display:flex;min-height:100vh}
#sidebar{width:260px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:200}
#main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sb-brand{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:block;width:100%;max-height:50px;object-fit:contain;background:#fff;border-radius:4px;padding:4px 6px;margin-bottom:6px}
.sb-sub{font-size:10px;color:#6a9acc;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sb-site{font-size:11px;color:#8aaaca;background:rgba(255,255,255,.06);border-radius:4px;padding:5px 10px;margin-top:6px}
.sb-site span{color:#c8d8f0;font-weight:700}
.sb-project-bar{padding:8px 10px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.08)}
.sb-project-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3a6a9a;margin-bottom:4px}
.sb-project-select{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;color:#c8d8f0;font-size:11px;font-family:var(--font);padding:5px 7px;outline:none;cursor:pointer}
.sb-project-btns{display:flex;gap:4px;margin-top:5px}
.sb-project-btns button{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:3px;color:#8aaaca;font-size:10px;font-family:var(--font);padding:3px 0;cursor:pointer}
.sb-project-btns button:hover{background:rgba(255,255,255,.14);color:#c8d8f0}
.sb-section{padding:10px 10px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#3a6a9a}
.sb-nav{flex:1;overflow-y:auto;padding-bottom:10px}
.sb-item{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:rgba(61,179,74,.12);border-left-color:var(--green2)}
.sb-item-name{flex:1;font-size:12px;color:#c8d8f0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.active .sb-item-name{color:#fff}
.sb-badge{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;background:rgba(255,255,255,.1);color:#8aaaca}
.sb-badge.ok{background:rgba(61,179,74,.2);color:#6ddb78}
.sb-badge.warn{background:rgba(227,82,5,.2);color:#f09060}
.sb-footer{padding:8px 10px;border-top:1px solid rgba(255,255,255,.08)}
.sb-add{width:100%;background:var(--green2);border:none;border-radius:5px;color:#fff;font-size:12px;font-family:var(--font);font-weight:700;padding:7px 0;cursor:pointer;margin-bottom:6px}
.sb-add:hover{background:var(--green)}
.sb-actions{display:flex;gap:5px;margin-bottom:5px}
.sb-action{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#8aaaca;font-size:10px;font-family:var(--font);padding:5px 0;cursor:pointer}
.sb-action:hover{background:rgba(255,255,255,.14);color:#c8d8f0}
.sb-action.danger:hover{background:rgba(220,38,38,.2);color:#f87171}
#topbar{background:var(--navy);border-bottom:3px solid var(--green2);display:flex;align-items:stretch;min-height:72px;flex-shrink:0}
.tb-logo{width:150px;flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:10px 14px;border-right:1px solid rgba(255,255,255,.1)}
.tb-logo img{max-width:130px;max-height:52px;object-fit:contain}
.tb-center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 16px;gap:4px}
.tb-title{font-size:10px;color:#4a7aaa;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.tb-docref{background:transparent;border:none;color:#fff;font-size:16px;font-family:var(--font);font-weight:800;outline:none;width:100%;padding:0}
.tb-docref::placeholder{color:rgba(255,255,255,.25)}
.tb-meta{display:flex;gap:10px;flex-wrap:wrap}
.mh-field{display:flex;align-items:center;gap:5px}
.mh-field label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4a7aaa;white-space:nowrap}
.mh-field input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:3px;color:#c8d8f0;font-size:11px;font-family:var(--font);padding:2px 6px;outline:none;width:110px}
.mh-field input:focus{border-color:var(--green2)}
.tb-actions{display:flex;align-items:center;gap:6px;padding:0 14px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:5px;border:none;font-size:12px;font-family:var(--font);font-weight:700;cursor:pointer;transition:background .15s}
.btn-primary{background:var(--green2);color:#fff}.btn-primary:hover{background:var(--green)}
.btn-outline{background:rgba(255,255,255,.08);color:#c8d8f0;border:1px solid rgba(255,255,255,.15)}.btn-outline:hover{background:rgba(255,255,255,.15)}
.btn-sm{padding:4px 9px;font-size:11px}
#content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--card);border-radius:var(--r2);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--steel);display:flex;align-items:center;gap:10px;background:var(--card2)}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:13px;font-weight:800;color:var(--navy)}
.card-body{padding:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--steel2);border-radius:var(--r);padding:7px 9px;font-size:12px;font-family:var(--font);color:var(--ink);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green2);box-shadow:0 0 0 2px rgba(61,179,74,.1)}
.field textarea{resize:vertical;min-height:60px}
.ce-list{display:flex;flex-direction:column;gap:6px}
.ce-row{display:flex;gap:6px;align-items:center}
.ce-input{flex:1;background:var(--bg);border:1px solid var(--steel2);border-radius:var(--r);padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--ink);outline:none}
.ce-input:focus{border-color:var(--green2)}
.add-btn{background:var(--green-l);border:1px solid var(--green-b);color:var(--gn);border-radius:var(--r);padding:4px 10px;font-size:11px;font-family:var(--font);font-weight:700;cursor:pointer;margin-top:4px}
.add-btn:hover{background:var(--green-b)}
.del-btn{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
.del-btn:hover{color:var(--red)}
.barrier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
.bc{border:1px solid var(--steel2);border-radius:var(--r);padding:10px;background:var(--card2);cursor:pointer;position:relative;transition:box-shadow .15s}
.bc:hover{box-shadow:var(--shadow)}
.bc.degraded{border-color:var(--amber-b);background:var(--amber-l)}
.bc.failed{border-color:var(--red-b);background:var(--red-l)}
.bc-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);margin-bottom:3px}
.bc-name{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px}
.bc-del{position:absolute;top:5px;right:6px;background:none;border:none;color:var(--ink4);cursor:pointer;font-size:14px;line-height:1}
.bc-del:hover{color:var(--red)}
.bc-status{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px}
.bc-status.effective{background:var(--green-l);color:var(--gn)}
.bc-status.degraded{background:var(--amber-l);color:var(--amber)}
.bc-status.failed{background:var(--red-l);color:var(--red)}
.assess-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.assess-kpi{background:var(--card2);border:1px solid var(--steel);border-radius:var(--r);padding:10px 12px}
.assess-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:3px}
.assess-val{font-size:18px;font-weight:800;color:var(--navy);font-family:var(--mono)}
.assess-unit{font-size:10px;color:var(--ink3)}
.alarp-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.alarp-badge.intolerable{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.alarp-badge.alarp{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b)}
.alarp-badge.tolerable{background:var(--green-l);color:var(--gn);border:1px solid var(--green-b)}
.zone-header{display:grid;grid-template-columns:2fr 70px 90px 80px 80px 24px;gap:6px;padding:4px 0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4)}
.zone-row{display:grid;grid-template-columns:2fr 70px 90px 80px 80px 24px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--steel)}
.zone-row:last-child{border-bottom:none}
table.rev-table{width:100%;border-collapse:collapse}
table.rev-table th,table.rev-table td{padding:5px 8px;font-size:11px;border:1px solid var(--steel2);text-align:left}
table.rev-table th{background:var(--card2);font-weight:700;color:var(--ink2)}
table.rev-table input{width:100%;background:none;border:none;font-size:11px;font-family:var(--font);color:var(--ink);outline:none}
.add-rev-btn{background:var(--blue-l);border:1px solid var(--blue-b);color:var(--blue);border-radius:var(--r);padding:4px 10px;font-size:11px;font-family:var(--font);font-weight:700;cursor:pointer;margin-top:6px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border-radius:var(--r2);padding:20px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal h3{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:14px}
.modal .field{margin-bottom:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--steel)}
.spacer{flex:1}
.flex{display:flex;align-items:center;gap:8px}
.hint{font-size:11px;color:var(--ink4);margin-top:4px}
</style>
</head>

let S = {scenarios:[],currentId:null,logoDataUrl:null,study:{company:'px Group',site:'Saltend Chemicals Park',docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}};
let _bmIdx = null;

// ════════════════════════════════════════════════
// PROJECTS
// ════════════════════════════════════════════════
const PIK='alarp_pidx_v1', PDK='alarp_pdat_v1_', PCK='alarp_pcur_v1';
const getProjIdx=()=>{try{const d=localStorage.getItem(PIK);return d?JSON.parse(d):[]}catch(e){return[]}};
const setProjIdx=a=>{try{localStorage.setItem(PIK,JSON.stringify(a))}catch(e){}};
const getCurId=()=>{try{return localStorage.getItem(PCK)||null}catch(e){return null}};
const setCurId=id=>{try{localStorage.setItem(PCK,id)}catch(e){}};
const loadPD=id=>{try{const d=localStorage.getItem(PDK+id);return d?JSON.parse(d):null}catch(e){return null}};
const savePD=(id,data)=>{try{localStorage.setItem(PDK+id,JSON.stringify(data))}catch(e){}};
const genId=()=>'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);

function renderProjectSelector(){
  const sel=document.getElementById('project-select');
  if(!sel)return;
  const idx=getProjIdx(),cur=getCurId();
  sel.innerHTML=idx.map(p=>`<option value="${p.id}"${p.id===cur?' selected':''}>${p.name}</option>`).join('');
}

function switchProject(id){
  const cur=getCurId();
  if(cur)savePD(cur,S);
  setCurId(id);
  const data=loadPD(id);
  S=data||{scenarios:[],currentId:null,logoDataUrl:null,study:{company:'px Group',site:'',docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}};
  normalise();
  if(S.scenarios.length===0)newScenario(false);
  else selectSc(S.scenarios[0].id);
  renderProjectSelector();
}

function newProject(){
  const name=prompt('New project name:','New Project');
  if(!name?.trim())return;
  const cur=getCurId();if(cur)savePD(cur,S);
  const id=genId(),idx=getProjIdx();
  idx.push({id,name:name.trim()});
  setProjIdx(idx);setCurId(id);
  S={scenarios:[],currentId:null,logoDataUrl:null,study:{company:'px Group',site:name.trim(),docRef:'ALARP-001',client:'',rev:'A',preparedBy:'',checkedBy:'',approvedBy:'',preparedDate:'',checkedDate:'',approvedDate:'',vpf:2000000,siteTier:'upper',revisions:[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}]}};
  newScenario(false);selectSc(S.scenarios[0].id);renderProjectSelector();
}

function renameProject(){
  const id=getCurId();if(!id)return;
  const idx=getProjIdx(),p=idx.find(x=>x.id===id);if(!p)return;
  const name=prompt('Rename project:',p.name);if(!name?.trim())return;
  p.name=name.trim();setProjIdx(idx);renderProjectSelector();save();
}

function deleteProject(){
  const idx=getProjIdx();
  if(idx.length<=1){alert('Cannot delete the only project.');return;}
  const id=getCurId();if(!id)return;
  const p=idx.find(x=>x.id===id);
  if(!confirm(`Delete project "${p?.name}"?`))return;
  const newIdx=idx.filter(x=>x.id!==id);
  setProjIdx(newIdx);try{localStorage.removeItem(PDK+id);}catch(e){}
  setCurId(newIdx[0].id);switchProject(newIdx[0].id);
}

// ════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════
function save(){
  const id=getCurId();
  if(id)savePD(id,S);
  else try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
}

function load(){
  let idx=getProjIdx();
  if(idx.length===0){
    const id=genId();
    idx=[{id,name:'Saltend Chemicals Park'}];
    setProjIdx(idx);
    try{const ex=localStorage.getItem(SK);if(ex)savePD(id,JSON.parse(ex));}catch(e){}
    setCurId(id);
  }
  let cur=getCurId();
  if(!cur||!idx.find(p=>p.id===cur)){cur=idx[0].id;setCurId(cur);}
  const data=loadPD(cur);
  if(data)S=data;
  else{try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d);}catch(e){}}
  normalise();
  if(S.scenarios.length===0)newScenario(false);
  else selectSc(S.scenarios[0].id);
  renderProjectSelector();
}

function normalise(){
  if(!S.scenarios)S.scenarios=[];
  if(!S.study)S.study={};
  if(!S.study.revisions)S.study.revisions=[{rev:'A',date:'',description:'Initial issue',prepared:'',checked:'',approved:''}];
  if(S.study.vpf==null)S.study.vpf=2000000;
  if(!S.study.siteTier)S.study.siteTier='upper';
  if(!S.study.docRef)S.study.docRef='ALARP-001';
}

// ════════════════════════════════════════════════
// SCENARIOS
// ════════════════════════════════════════════════
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>'sc_'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getSc=()=>S.scenarios.find(s=>s.id===S.currentId);

function blankSc(){
  return {id:uid(),name:'New Scenario',topEvent:'',causes:[''],consequences:[''],barriers:[],
    zones:[{label:'Zone 1 (on-site workers)',n:10,pf:0.1,distance:0}],
    freqM:1,freqE:-4,assessed:false,alarpVerdict:'',notes:'',created:today(),modified:today()};
}

function newScenario(sel){
  const sc=blankSc();S.scenarios.push(sc);save();
  if(sel){selectSc(sc.id);renderNav();}
}

function selectSc(id){S.currentId=id;save();renderNav();renderScenario();}

function deleteSc(){
  if(S.scenarios.length<=1){alert('Cannot delete the only scenario.');return;}
  if(!confirm('Delete this scenario permanently?'))return;
  S.scenarios=S.scenarios.filter(s=>s.id!==S.currentId);
  selectSc(S.scenarios[0].id);
}

function scField(f,v){const s=getSc();if(!s)return;s[f]=v;s.modified=today();save();}

// ════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════
function renderNav(){
  const nav=document.getElementById('sb-nav');if(!nav)return;
  nav.innerHTML=S.scenarios.map(sc=>{
    const active=sc.id===S.currentId;
    const badge=sc.assessed?(sc.alarpVerdict==='tolerable'?'<span class="sb-badge ok">ALARP</span>':'<span class="sb-badge warn">REVIEW</span>'):'';
    return `<div class="sb-item${active?' active':''}" data-id="${sc.id}" onclick="selectSc(this.dataset.id)">
      <span class="sb-item-name">${esc(sc.name||'Unnamed')}</span>${badge}</div>`;
  }).join('');
  const sn=document.getElementById('sb-site-name');if(sn)sn.textContent=S.study.site||'Saltend Chemicals Park';
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';}
  set('tb-docref',S.study.docRef);set('tb-rev',S.study.rev);
  set('tb-site',S.study.site);set('tb-prep',S.study.preparedBy);set('tb-date',S.study.preparedDate);
  if(S.logoDataUrl){
    const logo=S.logoDataUrl;
    ['sb-logo','tb-logo'].forEach(id=>{const el=document.getElementById(id);if(el)el.src=logo;});
  }
}

// ════════════════════════════════════════════════
// MATHS
// ════════════════════════════════════════════════
const getF=()=>{const s=getSc();return(s.freqM||1)*Math.pow(10,s.freqE||-4);};
const getPLL=()=>{const f=getF(),s=getSc();return s.zones.reduce((a,z)=>a+f*z.pf*z.n,0);};
const getIRF=()=>{const f=getF(),s=getSc();return s.zones.length?Math.max(...s.zones.map(z=>f*z.pf)):0;};
const getN=()=>{const s=getSc();return s.zones.reduce((a,z)=>a+z.n,0);};
function getBRRF(){
  const s=getSc();if(!s)return 1;
  return s.barriers.reduce((a,b)=>{
    if(b.status==='failed')return a;
    return a*(b.status==='degraded'?Math.sqrt(b.rrf||1):(b.rrf||1));
  },1);
}

function runAssessment(){
  const s=getSc();if(!s)return;
  const pll=getPLL(),irf=getIRF();
  const tier=S.study.siteTier||'upper';
  const tol_ir=tier==='upper'?1e-6:1e-4;
  const intol_ir=1e-3;
  let verdict='tolerable';
  if(irf>intol_ir||pll>0.1)verdict='intolerable';
  else if(irf>tol_ir||pll>0.001)verdict='alarp';
  s.assessed=true;s.alarpVerdict=verdict;s.pll=pll;s.irf=irf;
  s.modified=today();save();renderNav();renderScenario();
}

// ════════════════════════════════════════════════
// BARRIERS
// ════════════════════════════════════════════════
function openBarrierModal(side,idx){
  _bmIdx=idx;
  const s=getSc();if(!s)return;
  document.getElementById('bm-title').textContent=idx===null?'Add Barrier':'Edit Barrier';
  const b=idx!==null?s.barriers[idx]:null;
  const set=(id,v)=>{document.getElementById(id).value=v||'';};
  set('bm-type',b?.type||'Prevention');
  set('bm-side',b?.side||side);
  set('bm-name',b?.name||'');
  set('bm-rrf',b?.rrf||10);
  set('bm-status',b?.status||'effective');
  set('bm-owner',b?.owner||'');
  set('bm-tested',b?.tested||'');
  set('bm-notes',b?.notes||'');
  document.getElementById('barrier-modal').classList.add('open');
}
function closeBarrierModal(){document.getElementById('barrier-modal').classList.remove('open');}
function saveBarrier(){
  const s=getSc();if(!s)return;
  const get=id=>document.getElementById(id).value;
  const b={type:get('bm-type'),side:get('bm-side'),name:get('bm-name')||'Unnamed barrier',
    rrf:parseFloat(get('bm-rrf'))||10,status:get('bm-status'),
    owner:get('bm-owner'),tested:get('bm-tested'),notes:get('bm-notes')};
  if(_bmIdx!==null)s.barriers[_bmIdx]=b; else s.barriers.push(b);
  save();closeBarrierModal();renderScenario();
}
function deleteBarrier(idx){
  const s=getSc();if(!s)return;
  if(!confirm('Remove this barrier?'))return;
  s.barriers.splice(idx,1);save();renderScenario();
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function fmtE(v){
  if(!v&&v!==0)return '—';if(v===0)return '0';
  const e=Math.floor(Math.log10(Math.abs(v)));
  const m=(v/Math.pow(10,e)).toFixed(2);
  const sup=n=>String(n).split('').map(c=>({'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'}[c]||c)).join('');
  return `${m}×10${sup(e)}`;
}

function renderScenario(){
  const s=getSc();
  const el=document.getElementById('content');
  if(!s){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--ink3)">No scenario selected.</div>';return;}
  el.innerHTML=buildHTML(s);
  requestAnimationFrame(()=>{renderBowtie();drawFN();});
}

function liveUpdate(){const s=getSc();if(!s)return;s.modified=today();save();renderNav();requestAnimationFrame(()=>{renderBowtie();drawFN();});}

function buildHTML(s){
  const verdictBadge=s.assessed?`<div class="alarp-badge ${s.alarpVerdict}" style="margin-left:auto">
    ${s.alarpVerdict==='intolerable'?'&#9888; INTOLERABLE':s.alarpVerdict==='alarp'?'&#9672; ALARP Region':'&#10003; TOLERABLE'}</div>`:'';

  const kpiHTML=s.assessed?`
    <div class="assess-grid">
      <div class="assess-kpi"><div class="assess-label">Individual Risk Frequency</div>
        <div class="assess-val">${fmtE(s.irf)}</div><div class="assess-unit">per year</div></div>
      <div class="assess-kpi"><div class="assess-label">Potential Loss of Life (PLL)</div>
        <div class="assess-val">${fmtE(s.pll)}</div><div class="assess-unit">lives / year</div></div>
      <div class="assess-kpi"><div class="assess-label">Combined Barrier RRF</div>
        <div class="assess-val">${getBRRF().toFixed(0)}</div><div class="assess-unit">risk reduction</div></div>
    </div>`:'';

  const causesHTML=s.causes.map((c,i)=>`
    <div class="ce-row">
      <input class="ce-input" value="${esc(c)}" placeholder="Cause ${i+1}…"
        oninput="getSc().causes[${i}]=this.value;liveUpdate()"/>
      <button class="del-btn" onclick="delItem('causes',${i})">&#215;</button>
    </div>`).join('');

  const consqHTML=s.consequences.map((c,i)=>`
    <div class="ce-row">
      <input class="ce-input" value="${esc(c)}" placeholder="Consequence ${i+1}…"
        oninput="getSc().consequences[${i}]=this.value;liveUpdate()"/>
      <button class="del-btn" onclick="delItem('consequences',${i})">&#215;</button>
    </div>`).join('');

  const barrierCard=(b,i)=>`
    <div class="bc ${b.status||'effective'}" onclick="openBarrierModal('${b.side}',${i})">
      <button class="bc-del" onclick="event.stopPropagation();deleteBarrier(${i})">&#215;</button>
      <div class="bc-type">${esc(b.type)}</div>
      <div class="bc-name">${esc(b.name)}</div>
      <div><span class="bc-status ${b.status||'effective'}">${b.status||'effective'}</span>
        <span style="font-size:10px;font-weight:700;color:var(--navy);margin-left:6px">RRF: ${b.rrf||1}</span></div>
      ${b.owner?`<div style="font-size:10px;color:var(--ink3);margin-top:3px">${esc(b.owner)}</div>`:''}</div>`;

  const tBarrs=s.barriers.filter(b=>b.side==='threat');
  const cBarrs=s.barriers.filter(b=>b.side==='consequence');
  const threatCards=tBarrs.map(b=>barrierCard(b,s.barriers.indexOf(b))).join('')||'<div style="color:var(--ink4);font-size:12px">No threat-side barriers defined</div>';
  const consqCards=cBarrs.map(b=>barrierCard(b,s.barriers.indexOf(b))).join('')||'<div style="color:var(--ink4);font-size:12px">No consequence-side barriers defined</div>';

  const zonesHTML=`
    <div class="zone-header"><span>Zone / Population</span><span>N People</span><span>P(fatality|event)</span><span>Distance m</span><span>PLL contrib.</span><span></span></div>
    ${s.zones.map((z,i)=>`
    <div class="zone-row">
      <input class="ce-input" value="${esc(z.label||'')}" placeholder="Zone label"
        oninput="getSc().zones[${i}].label=this.value;liveUpdate()"/>
      <input class="ce-input" type="number" min="1" value="${z.n||1}"
        oninput="getSc().zones[${i}].n=parseFloat(this.value)||1;liveUpdate()"/>
      <input class="ce-input" type="number" min="0" max="1" step="0.01" value="${z.pf||0.1}"
        oninput="getSc().zones[${i}].pf=parseFloat(this.value)||0;liveUpdate()"/>
      <input class="ce-input" type="number" value="${z.distance||0}"
        oninput="getSc().zones[${i}].distance=parseFloat(this.value)||0;liveUpdate()"/>
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--navy)">${fmtE(getF()*z.pf*z.n)}</span>
      <button class="del-btn" onclick="delZone(${i})">&#215;</button>
    </div>`).join('')}`;

  const revRows=(S.study.revisions||[]).map((r,i)=>`
    <tr>
      <td><input value="${esc(r.rev)}" oninput="S.study.revisions[${i}].rev=this.value;save()"/></td>
      <td><input type="date" value="${esc(r.date)}" oninput="S.study.revisions[${i}].date=this.value;save()"/></td>
      <td><input value="${esc(r.description)}" oninput="S.study.revisions[${i}].description=this.value;save()"/></td>
      <td><input value="${esc(r.prepared)}" oninput="S.study.revisions[${i}].prepared=this.value;save()"/></td>
      <td><input value="${esc(r.checked)}" oninput="S.study.revisions[${i}].checked=this.value;save()"/></td>
      <td><input value="${esc(r.approved)}" oninput="S.study.revisions[${i}].approved=this.value;save()"/></td>
    </tr>`).join('');

  return `
    <div class="card">
      <div class="card-head"><div class="card-num">1</div><div class="card-title">Scenario Definition</div>${verdictBadge}</div>
      <div class="card-body">
        <div class="g2" style="margin-bottom:12px">
          <div class="field"><label>Scenario Name</label>
            <input value="${esc(s.name)}" oninput="scField('name',this.value);renderNav()"/></div>
          <div class="field"><label>Top Event</label>
            <input value="${esc(s.topEvent)}" placeholder="e.g. Loss of containment of flammable liquid"
              oninput="scField('topEvent',this.value);liveUpdate()"/></div>
        </div>
        <div class="g2">
          <div class="field"><label>Hazardous Event Frequency</label>
            <div class="flex">
              <input type="number" style="width:70px" min="0.1" max="9.9" step="0.1" value="${s.freqM||1}"
                oninput="getSc().freqM=parseFloat(this.value)||1;liveUpdate()"/>
              <span style="color:var(--ink3)">&#215; 10</span>
              <input type="number" style="width:56px" min="-9" max="0" value="${s.freqE||-4}"
                oninput="getSc().freqE=parseInt(this.value)||-4;liveUpdate()"/>
              <span style="color:var(--ink3);font-size:11px">per year</span>
            </div>
          </div>
          <div class="field"><label>Notes</label>
            <textarea oninput="scField('notes',this.value)">${esc(s.notes)}</textarea></div>
        </div>
      </div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><div class="card-num">2</div><div class="card-title">Causes / Initiating Events</div></div>
        <div class="card-body">
          <div class="ce-list">${causesHTML}</div>
          <button class="add-btn" onclick="addItem('causes')">+ Add cause</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-num">3</div><div class="card-title">Consequences</div></div>
        <div class="card-body">
          <div class="ce-list">${consqHTML}</div>
          <button class="add-btn" onclick="addItem('consequences')">+ Add consequence</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-num">4</div>
        <div class="card-title">Threat-Side Barriers</div>
        <div class="spacer"></div>
        <button class="btn btn-primary btn-sm" onclick="openBarrierModal('threat',null)">+ Add Barrier</button>
      </div>
      <div class="card-body"><div class="barrier-grid">${threatCards}</div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-num">5</div>
        <div class="card-title">Consequence-Side Barriers</div>
        <div class="spacer"></div>
        <button class="btn btn-primary btn-sm" onclick="openBarrierModal('consequence',null)">+ Add Barrier</button>
      </div>
      <div class="card-body"><div class="barrier-grid">${consqCards}</div></div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-num">6</div><div class="card-title">Bowtie Diagram</div></div>
      <div class="card-body"><canvas id="bowtie-canvas" height="200" style="width:100%;border-radius:var(--r);background:var(--card2)"></canvas></div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><div class="card-num">7</div><div class="card-title">Exposed Populations / Zones</div>
          <div class="spacer"></div>
          <button class="btn btn-primary btn-sm" onclick="addZone()">+ Zone</button>
        </div>
        <div class="card-body">
          <div class="field" style="margin-bottom:10px">
            <label>VPF — Value of Preventing a Fatality (£)</label>
            <input type="number" value="${S.study.vpf||2000000}" oninput="S.study.vpf=parseInt(this.value)||2000000;save()"/>
          </div>
          <div class="field" style="margin-bottom:10px"><label>Site Tier</label>
            <select onchange="S.study.siteTier=this.value;save()">
              <option value="upper"${S.study.siteTier==='upper'?' selected':''}>Upper Tier COMAH</option>
              <option value="lower"${S.study.siteTier==='lower'?' selected':''}>Lower Tier COMAH</option>
            </select>
          </div>
          ${zonesHTML}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-num">8</div><div class="card-title">ALARP Assessment</div></div>
        <div class="card-body">
          ${kpiHTML}
          <button class="btn btn-primary" onclick="runAssessment()" style="width:100%;margin-bottom:12px">&#9654; Run Assessment</button>
          <canvas id="fn-canvas" width="320" height="270" style="border-radius:var(--r);background:#fff;max-width:100%"></canvas>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-num">9</div><div class="card-title">Document Revision History</div></div>
      <div class="card-body">
        <table class="rev-table">
          <thead><tr><th>Rev</th><th>Date</th><th>Description</th><th>Prepared</th><th>Checked</th><th>Approved</th></tr></thead>
          <tbody>${revRows}</tbody>
        </table>
        <button class="add-rev-btn" onclick="addRev()">+ Add Revision</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════
// LIST HELPERS
// ════════════════════════════════════════════════
function addItem(field){const s=getSc();if(!s)return;s[field].push('');save();renderScenario();}
function delItem(field,i){
  const s=getSc();if(!s)return;
  if(s[field].length<=1){s[field][0]='';save();renderScenario();return;}
  s[field].splice(i,1);save();renderScenario();
}
function addZone(){const s=getSc();if(!s)return;s.zones.push({label:'New zone',n:1,pf:0.1,distance:0});save();renderScenario();}
function delZone(i){const s=getSc();if(!s)return;if(s.zones.length<=1){alert('Need at least one zone.');return;}s.zones.splice(i,1);save();renderScenario();}
function addRev(){S.study.revisions=S.study.revisions||[];S.study.revisions.push({rev:'',date:'',description:'',prepared:'',checked:'',approved:''});save();renderScenario();}

// ════════════════════════════════════════════════
// BOWTIE
// ════════════════════════════════════════════════
function renderBowtie(){
  const cv=document.getElementById('bowtie-canvas');if(!cv)return;
  const s=getSc();if(!s)return;
  const W=cv.offsetWidth||900;cv.width=W;
  const H=200,ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  // Top event diamond
  ctx.beginPath();ctx.moveTo(cx,cy-36);ctx.lineTo(cx+54,cy);ctx.lineTo(cx,cy+36);ctx.lineTo(cx-54,cy);ctx.closePath();
  ctx.fillStyle='#0D1F3C';ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 10px Nunito Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const te=(s.topEvent||'Top Event').slice(0,20);
  ctx.fillText(te,cx,cy);
  // Causes (left side)
  const causes=s.causes.filter(c=>c.trim());
  const step=Math.min(50,140/Math.max(causes.length,1));
  causes.forEach((c,i)=>{
    const y=cy-(causes.length-1)*step/2+i*step;
    ctx.beginPath();ctx.moveTo(48,y);ctx.lineTo(cx-56,cy);ctx.strokeStyle='#3DB34A';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#374151';ctx.font='11px Nunito Sans,sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(c.slice(0,22),4,y);
  });
  // Consequences (right side)
  const consqs=s.consequences.filter(c=>c.trim());
  consqs.forEach((c,i)=>{
    const y=cy-(consqs.length-1)*step/2+i*step;
    ctx.beginPath();ctx.moveTo(cx+56,cy);ctx.lineTo(W-48,y);ctx.strokeStyle='#E35205';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#374151';ctx.font='11px Nunito Sans,sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(c.slice(0,22),W-4,y);
  });
  // Threat barriers
  s.barriers.filter(b=>b.side==='threat').forEach((b,i)=>{
    const bx=90+i*58;
    ctx.fillStyle=b.status==='failed'?'#fee2e2':b.status==='degraded'?'#fffbeb':'#f0fdf4';
    ctx.strokeStyle=b.status==='failed'?'#fca5a5':b.status==='degraded'?'#fcd34d':'#86efac';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx-22,cy-24,44,48,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='#1e3a8a';ctx.font='bold 8px Nunito Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.name.slice(0,10),bx,cy);
  });
  // Consequence barriers
  s.barriers.filter(b=>b.side==='consequence').forEach((b,i)=>{
    const bx=cx+80+i*58;
    ctx.fillStyle=b.status==='failed'?'#fee2e2':b.status==='degraded'?'#fffbeb':'#f0fdf4';
    ctx.strokeStyle=b.status==='failed'?'#fca5a5':b.status==='degraded'?'#fcd34d':'#86efac';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx-22,cy-24,44,48,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='#1e3a8a';ctx.font='bold 8px Nunito Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.name.slice(0,10),bx,cy);
  });
}

// ════════════════════════════════════════════════
// FN CHART
// ════════════════════════════════════════════════
function drawFN(){
  const cv=document.getElementById('fn-canvas');if(!cv)return;
  const W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const pl={l:46,r:14,t:14,b:36};
  const lw=W-pl.l-pl.r,lh=H-pl.t-pl.b;
  const nMin=-8,nMax=3,fMin=-9,fMax=0;
  const nx=n=>pl.l+((n-nMin)/(nMax-nMin))*lw;
  const fy=f=>pl.t+((fMax-f)/(fMax-fMin))*lh;
  const sup=n=>String(n).split('').map(c=>({'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','-':'⁻'}[c]||c)).join('');
  // Regions
  ctx.globalAlpha=0.12;
  ctx.fillStyle='#ef4444';ctx.fillRect(pl.l,pl.t,lw,fy(-3)-pl.t);
  ctx.fillStyle='#f59e0b';ctx.fillRect(pl.l,fy(-3),lw,fy(-6)-fy(-3));
  ctx.fillStyle='#22c55e';ctx.fillRect(pl.l,fy(-6),lw,pl.t+lh-fy(-6));
  ctx.globalAlpha=1;
  // Grid
  ctx.strokeStyle='#e5e7eb';ctx.lineWidth=0.8;
  for(let i=nMin;i<=nMax;i++){ctx.beginPath();ctx.moveTo(nx(i),pl.t);ctx.lineTo(nx(i),pl.t+lh);ctx.stroke();}
  for(let j=fMin;j<=fMax;j++){ctx.beginPath();ctx.moveTo(pl.l,fy(j));ctx.lineTo(pl.l+lw,fy(j));ctx.stroke();}
  // Axes
  ctx.strokeStyle='#6b7280';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pl.l,pl.t);ctx.lineTo(pl.l,pl.t+lh);ctx.lineTo(pl.l+lw,pl.t+lh);ctx.stroke();
  // Labels
  ctx.fillStyle='#374151';ctx.font='9px Nunito Sans,sans-serif';ctx.textAlign='center';
  for(let k=nMin;k<=nMax;k+=2)ctx.fillText('10'+sup(k),nx(k),pl.t+lh+13);
  ctx.textAlign='right';
  for(let m=fMin;m<=fMax;m+=2)ctx.fillText('10'+sup(m),pl.l-3,fy(m)+3);
  ctx.save();ctx.translate(11,pl.t+lh/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.font='9px Nunito Sans,sans-serif';ctx.fillStyle='#6b7280';ctx.fillText('Freq (/ yr)',0,0);ctx.restore();
  ctx.textAlign='center';ctx.font='9px Nunito Sans,sans-serif';ctx.fillStyle='#6b7280';ctx.fillText('Number of fatalities N',pl.l+lw/2,H-4);
  // Region labels
  ctx.textAlign='right';ctx.font='bold 8px Nunito Sans,sans-serif';
  ctx.fillStyle='#991b1b';ctx.fillText('INTOLERABLE',pl.l+lw-4,fy(-3)+12);
  ctx.fillStyle='#92400e';ctx.fillText('ALARP',pl.l+lw-4,fy(-6)+12);
  ctx.fillStyle='#14532d';ctx.fillText('TOLERABLE',pl.l+lw-4,pl.t+lh-6);
  // Point
  const s=getSc();
  if(s?.assessed&&s.irf&&s.irf>0){
    const n=getN()||1;
    const logn=Math.max(nMin,Math.min(nMax,Math.log10(n)));
    const logf=Math.max(fMin,Math.min(fMax,Math.log10(s.irf*n)));
    ctx.fillStyle='#0D1F3C';ctx.beginPath();ctx.arc(nx(logn),fy(logf),5,0,2*Math.PI);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }
}

// LOGO / IMPORT / EXPORT / PRINT
// ════════════════════════════════════════════════
function uploadLogo(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    S.logoDataUrl=e.target.result;save();
    ['sb-logo','tb-logo'].forEach(id=>{const el=document.getElementById(id);if(el)el.src=e.target.result;});
  };
  r.readAsDataURL(file);
}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`alarp_${S.study.docRef||'study'}_${today()}.json`;a.click();
}

function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=()=>{
    const f=input.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(confirm('Replace current project data with imported file?')){
          const id=getCurId();if(id)savePD(id,d);
          S=d;normalise();renderNav();renderScenario();
        }
      }catch(err){alert('Invalid JSON file.');}
    };
    r.readAsText(f);
  };
  input.click();
}

function printAll(){
  const savedId=S.currentId;
  const pages=S.scenarios.map((sc,i)=>{
    S.currentId=sc.id;
    return buildHTML(sc)+(i<S.scenarios.length-1?'<div style="page-break-after:always"></div>':'');
  }).join('');
  S.currentId=savedId;
  const style=document.querySelector('style').innerHTML;
  const w=window.open('','_blank','width=1100,height=800');
  if(!w){alert('Please allow popups to print all scenarios.');return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>${style} body{background:#fff;padding:20px} #sidebar,#topbar,.no-print,.btn,.add-btn,.del-btn,.sb-action,.add-rev-btn,.bc-del{display:none!important} #main{margin-left:0} #content{padding:0}</style>
    </head><body>${pages}<script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}
